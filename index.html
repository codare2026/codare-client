<title>Co-Dare 口袋營養獅｜學員專區</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script>
// ── Supabase 設定 ──
const SB_URL  = 'https://iqfnbwyjehwdbxptquyr.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZm5id3lqZWh3ZGJ4cHRxdXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODU5MjcsImV4cCI6MjA5MjM2MTkyN30.F5XSv6TKkJfek8bLmYsgvYgD7cnLGLirpNwC7SqbNDY';
const SB_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };

const _cache = {};
let _sbReady = true;
let _realtimeChannel = null;

// ── 讀取（先 cache → localStorage，背景同步） ──
function gs(key) {
  if (_cache[key] !== undefined) return _cache[key];
  try { const v = localStorage.getItem('cd_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
}

// ── 寫入（cache + localStorage + Supabase 非同步） ──
function ss(key, val) {
  _cache[key] = val;
  try { if (val === null) localStorage.removeItem('cd_' + key); else localStorage.setItem('cd_' + key, JSON.stringify(val)); } catch {}
  sbWrite(key, val);
}

async function sbWrite(key, val) {
  try {
    if (val === null) {
      await fetch(`${SB_URL}/rest/v1/cd?key=eq.${encodeURIComponent(key)}`, { method: 'DELETE', headers: SB_HDRS });
    } else {
      // 使用 upsert（merge-duplicates）確保跨裝置同步
      await fetch(`${SB_URL}/rest/v1/cd`, {
        method: 'POST',
        headers: { ...SB_HDRS, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ key, value: val })
      });
    }
  } catch(e) { console.warn('Supabase write error:', e.message); }
}

// ── 上傳圖片到 Supabase Storage（取代 base64 存資料庫）──
async function uploadPhoto(file, userId, day, mealKey) {
  const ext = file.type === 'image/png' ? 'png' : 'jpg';
  const path = `${userId}/${day.replace(/\//g,'_')}/${mealKey}_${Date.now()}.${ext}`;
  const res = await fetch(`${SB_URL}/storage/v1/object/photos/${path}`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
    body: file
  });
  if (!res.ok) throw new Error('上傳失敗');
  return `${SB_URL}/storage/v1/object/public/photos/${path}`;
}

// ── 從 localStorage 預載 cache（瞬間啟動）──
function preloadLocalCache() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('cd_')) {
        const k = key.slice(3);
        if (_cache[k] === undefined) {
          try { _cache[k] = JSON.parse(localStorage.getItem(key)); } catch {}
        }
      }
    }
  } catch(e) {}
}

// ── warmCache：只同步當前學員的資料（節省流量）──
async function warmCache(userId) {
  preloadLocalCache();
  if (!userId) return;
  try {
    // 用 ilike 抓所有包含 userId 的 key（最穩定的方式）
    const encoded = encodeURIComponent(`%${userId}%`);
    const res = await Promise.race([
      fetch(`${SB_URL}/rest/v1/cd?key=ilike.${encoded}&select=key,value&limit=500`, { headers: SB_HDRS }),
      new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 8000))
    ]);
    if (!res.ok) {
      const errText = await res.text();
      console.warn('warmCache HTTP error:', res.status, errText);
      return;
    }
    const rows = await res.json();
    rows.forEach(({ key, value }) => {
      _cache[key] = value;
      try { localStorage.setItem('cd_' + key, JSON.stringify(value)); } catch {}
    });
  } catch(e) { console.warn('warmCache failed, using localStorage:', e.message); throw e; }
}

// ── bgSyncClient：背景更新，不阻塞 UI ──
function bgSyncClient(userId) {
  if (!userId) return;
  setTimeout(async () => {
    try { await warmCache(userId); updateInboxBadge(); } catch(e) {}
  }, 300);
}

// ── Realtime 監聽（Supabase Realtime）──
function startRealtimeSync(userId) {
  if (_realtimeChannel) return;
  try {
    // 使用 Supabase Realtime via WebSocket
    const wsUrl = `${SB_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`;
    const ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ topic: 'realtime:public:cd', event: 'phx_join', payload: {}, ref: '1' }));
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'postgres_changes' || msg.event === 'INSERT' || msg.event === 'UPDATE') {
          const record = msg.payload?.record || msg.payload?.new;
          if (record?.key && record.key.startsWith(`food_${userId}`)) {
            _cache[record.key] = record.value;
            try { localStorage.setItem('cd_' + record.key, JSON.stringify(record.value)); } catch {}
            if (currentFoodDay) {
              document.getElementById('main-content').innerHTML = renderFoodEntry(currentFoodDay);
            } else if (currentPage === 'home') {
              document.getElementById('main-content').innerHTML = renderHome();
            }
            updateInboxBadge();
          }
          if (record?.key?.startsWith(`inbox_${userId}`)) {
            _cache[record.key] = record.value;
            try { localStorage.setItem('cd_' + record.key, JSON.stringify(record.value)); } catch {}
            updateInboxBadge();
            if (currentPage === 'home') document.getElementById('main-content').innerHTML = renderHome();
          }
        }
      } catch(e) {}
    };
    _realtimeChannel = ws;
  } catch(e) { console.warn('Realtime init failed:', e.message); }
}
</script>

.add-period-btn { width: 100%; padding: 13px; border: 1.5px dashed var(--gray-300); border-radius: 12px; background: none; font-family: inherit; font-size: 14px; color: var(--gray-400); cursor: pointer; margin-top: 4px; }

/* UTILITY */
.hidden { display: none !important; }
.divider { height: 1px; background: var(--gray-100); margin: 16px 0; }
.mb12 { margin-bottom: 12px; }

/* LOADING SCREEN */
#loading-screen {
  position: fixed; inset: 0; background: #fff; z-index: 99999;

}
.loading-spinner {

}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    </button>
  </nav>

<div class="toast" id="toast"></div>

<script>
// ══════════ DATA ══════════
const USERS = {
  '0912345678': { password: 'codare123', name: '小明', period: '2026/05/25 – 06/22', currentWeek: 1, goal: '本期目標：體重從 68kg 降至 65kg，養成均衡飲食習慣' }
};

const DEFAULT_GOALS = {
  1: [
    { text: '每天喝 1500ml 的水', done: false },
    { text: '每天吃 3 份蔬菜', done: false },
    { text: '每天吃一份水果', done: false },
    { text: '一週運動三天（至少 30 分鐘）', done: false }
  ],
  2: [], 3: [], 4: []
};

const DEFAULT_PROGRESS = [
  { week: 'W1', weight: null, fat: null, waist: null, muscle: null },
  { week: 'W2', weight: null, fat: null, waist: null, muscle: null },
  { week: 'W3', weight: null, fat: null, waist: null, muscle: null },
  { week: 'W4', weight: null, fat: null, waist: null, muscle: null }
];

// Weekly nutritionist plan (set by RD, read-only for student)
// Weekly plans are set by RD, default empty
const DEFAULT_WEEKLY_PLANS = {};

const MATERIALS = [];

// Menus are set by RD, default empty
const DEFAULT_MENUS = {};

// Build course dates dynamically from currentUser.start (set after login)
// Format: M/D for each day in 29-day course
// Build course dates from start to end (inclusive), every day
function buildCourseDates(startStr, endStr) {
  const parseDate = str => {
    if (!str) return null;
    const p = str.replace(/-/g,'/').split('/');
    if (p.length === 3) return new Date(+p[0], +p[1]-1, +p[2]);
    if (p.length === 2) return new Date(2026, +p[0]-1, +p[1]);
    return null;
  };
  const base = parseDate(startStr) || new Date(2026, 4, 25);
  const end  = parseDate(endStr);
  if (isNaN(base.getTime())) return [];
  const dates = [];
  for (let i = 0; i < 366; i++) {
    const d = new Date(base); d.setDate(base.getDate() + i);
    if (end && d > end) break;
    if (!end && i >= 29) break;
    dates.push(`${d.getMonth()+1}/${d.getDate()}`);
  }
  return dates;
}

// COURSE_DATES rebuilt on login from currentUser.start + end
let COURSE_DATES = buildCourseDates('2026/05/25', '2026/06/22');

// Group dates into weeks (7 days each)
function buildWeekGroups(dates) {
  const groups = [];
  for (let w = 0; w * 7 < dates.length; w++) {
    const chunk = dates.slice(w*7, (w+1)*7);
    if (!chunk.length) break;
    groups.push({ label: `W${w+1} ${chunk[0]}–${chunk[chunk.length-1]}`, dates: chunk });
  }
  return groups;
}

// ══════════ STATE ══════════
let currentUser = null;
let currentPage = 'home';
let currentFoodDay = null;
let currentGoalWeek = 1;
let currentProgressWeek = null;
let currentMatTab = 'courses';
let currentFoodCat = null; // null = category list, 'food_grain' etc = gallery view
let currentMenuPeriod = 1;

// ══════════ STORAGE ══════════
// gs() and ss() are defined in <head> via Firebase SDK

// ══════════ AUTH ══════════
function togglePw() {
  const input = document.getElementById('login-pw');
  const btn = document.getElementById('pw-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隱藏';
  } else {
    input.type = 'password';
    btn.textContent = '顯示';
  }
}

async function findUser(id, pw) {
  if (USERS[id] && USERS[id].password === pw) return { ...USERS[id], id };
  try {
    const res = await fetch(`${SB_URL}/rest/v1/cd?key=eq.dynuser_${id}&select=value`, { headers: SB_HDRS });
    if (res.ok) {
      const rows = await res.json();
      if (rows[0]?.value?.password === pw) return { ...rows[0].value, id };
    }
  } catch(e) {}
  try {
    const dyn = JSON.parse(localStorage.getItem('cd_dynuser_' + id));
    if (dyn && dyn.password === pw) return { ...dyn, id };
  } catch(e) {}
  return null;
}

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const keep = document.getElementById('keep-login').checked;
  const loginBtn = document.querySelector('.btn-primary');
  if (loginBtn) { loginBtn.textContent = '登入中...'; loginBtn.disabled = true; }
  const u = await findUser(id, pw);
  if (loginBtn) { loginBtn.textContent = '登入'; loginBtn.disabled = false; }
  if (u) {
    currentUser = u;
    document.getElementById('login-error').style.display = 'none';
    if (keep) localStorage.setItem('cd_autologin', JSON.stringify({ id, pw }));
    else localStorage.removeItem('cd_autologin');
    // 從 Supabase 同步此學員最新資料（跨裝置）
    try { await warmCache(id); } catch(e) { preloadLocalCache(); }
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    launchApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function launchApp() {
  const startDate = currentUser.start || '2026/05/25';
  const endDate   = currentUser.end   || null;
  COURSE_DATES.length = 0;
  buildCourseDates(startDate, endDate).forEach(d => COURSE_DATES.push(d));

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topbar-name').textContent = currentUser.name + ' 學員';

  startRealtimeSync(currentUser.id);

  showPage('home');
  setTimeout(updateInboxBadge, 500);
}

function doLogout() {
  localStorage.removeItem('cd_autologin');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').type = 'password';
  document.getElementById('pw-toggle').textContent = '顯示';
  currentUser = null;
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('keep-login').checked = false;
  // Clear cache on logout
  Object.keys(_cache).forEach(k => delete _cache[k]);
}

// Auto-login check on page load
(function checkAutoLogin() {
  setTimeout(async () => {
    try {
      const saved = JSON.parse(localStorage.getItem('cd_autologin'));
      if (saved && saved.id && saved.pw) {
        const u = await findUser(saved.id, saved.pw);
        if (u) {
          currentUser = u;
          // 從 Supabase 同步此學員最新資料（跨裝置）
          try { await warmCache(saved.id); } catch(e) { preloadLocalCache(); }
          document.getElementById('loading-screen').style.display = 'none';
          launchApp();
          return;
        }
      }
    } catch(e) {}
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }, 300);  // reduced from 500ms
})();

// ══════════ NAV ══════════
function showPage(page) {
  currentPage = page;
  currentFoodDay = null;
  currentProgressWeek = null;
  ['home','food','body','goals','menu','materials','inbox'].forEach(p => {
    const el = document.getElementById('nav-' + p);
    if (el) el.classList.toggle('active', p === page);
  });
  // Show loading briefly while rendering (prevents blank flash)
  const el = document.getElementById('main-content');
  el.innerHTML = `<div class="inline-loading">
    <div class="loading-spinner"></div>
    <div style="font-size:13px;color:var(--gray-400)">載入中…</div>
  </div>`;
  // Use requestAnimationFrame to let browser paint loading first, then render
  requestAnimationFrame(() => requestAnimationFrame(() => renderPage()));
}

// ══════════ TOAST ══════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════ RENDER ══════════
function renderPage() {
  const el = document.getElementById('main-content');
  if (currentFoodDay) { el.innerHTML = renderFoodEntry(currentFoodDay); return; }
  if (currentProgressWeek !== null && currentPage === 'body') { el.innerHTML = renderProgressDetail(currentProgressWeek); return; }
  const map = { home: renderHome, food: renderFoodList, body: renderBody, goals: renderGoals, menu: renderMenu, materials: renderMaterials, inbox: renderInbox };
  el.innerHTML = (map[currentPage] || renderHome)();
}

// ── HOME ──
async function syncClientData() {
  const btn = document.querySelector('[onclick="syncClientData()"]');
  if (btn) { btn.style.opacity = '0.5'; btn.textContent = '🔄 同步中…'; }
  try {
    const userId = currentUser.id;
    // 用 warmCache 完整同步此學員所有資料（包含營養師回覆）
    await warmCache(userId);
    if (btn) { btn.style.opacity = ''; btn.textContent = '🔄 同步資料'; }
    showToast('✅ 資料已同步！');
    // 重新渲染當前頁面，讓營養師回覆立即顯示
    if (currentFoodDay) {
      document.getElementById('main-content').innerHTML = renderFoodEntry(currentFoodDay);
    } else {
      renderPage();
    }
    updateInboxBadge();
  } catch(e) {
    if (btn) { btn.style.opacity = ''; btn.textContent = '🔄 同步資料'; }
    showToast('⚠️ 同步失敗，請檢查網路');
  }
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}

function getDailyGoals(userId, week) {
  const today = getTodayKey();
  return gs(`daily_goals_${userId}_${week}_${today}`) || [];
}

function updateInboxBadge() {
  const msgs = gs(`inbox_${currentUser.id}`) || [];
  const unread = msgs.filter(m => !m.read).length;
  const badge = document.getElementById('inbox-badge');
  if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? '' : 'none'; }
}

function renderHome() {
  const today = new Date();
  const todayStr = `${today.getMonth()+1}/${today.getDate()}`;
  const done = COURSE_DATES.filter(d => {
    const s = gs(`food_${currentUser.id}_${d}`);
    return s && s.notified;
  }).length;
  const passed = COURSE_DATES.filter(d => {
    const [m, day] = d.split('/').map(Number);
    return new Date(today.getFullYear(), m-1, day) <= today;
  }).length;
  const pct = passed ? Math.round(done / passed * 100) : 0;

  const prog = gs(`progress_${currentUser.id}`) || DEFAULT_PROGRESS;
  const wGroups = buildWeekGroups(COURSE_DATES);
  const curWeekIdx = wGroups.findIndex(wg => wg.dates.includes(todayStr));
  const curWeek = curWeekIdx >= 0 ? curWeekIdx + 1 : 1;

  // Daily goals (today's check-in)
  const goals = gs(`goals_${currentUser.id}_${curWeek}`) || [];
  const dailyDone = getDailyGoals(currentUser.id, curWeek);
  const doneCount = goals.filter((_, i) => dailyDone[i]).length;

  // Unread inbox
  const msgs = gs(`inbox_${currentUser.id}`) || [];
  const unread = msgs.filter(m => !m.read).length;

  // Red dot: only show if student has notified AND RD has never replied to this day
  const newFbDays = COURSE_DATES.filter(d => {
    const f = gs(`food_${currentUser.id}_${d}`);
    if (!f || !f.rdFeedbackDone) return false;
    if (f.fbRead) return false;
    return true;
  });

  const fbNoticeHTML = newFbDays.length > 0 ? `
  <div class="card" style="background:linear-gradient(135deg,#e8f5ee,#f0fdf4);border:1.5px solid var(--green);margin-bottom:4px;cursor:pointer" onclick="goToFeedbackDay('${newFbDays[0]}')">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:30px">🥦</div>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--green-dark);font-size:15px">營養師有新回饋！</div>
        <div style="font-size:12px;color:var(--green);margin-top:2px">共 ${newFbDays.length} 天尚未查看，點此查看回饋</div>
      </div>
      <div style="background:var(--green);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${newFbDays.length}</div>
    </div>
  </div>` : '';

  const inboxNoticeHTML = unread > 0 ? `
  <div class="card" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #3b82f6;margin-bottom:4px;cursor:pointer" onclick="showPage('inbox')">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:30px">📬</div>
      <div style="flex:1">
        <div style="font-weight:700;color:#1e40af;font-size:15px">有 ${unread} 則新通知！</div>
        <div style="font-size:12px;color:#3b82f6;margin-top:2px">點此查看收件夾</div>
      </div>
      <div style="background:#3b82f6;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${unread}</div>
    </div>
  </div>` : '';

  const w1 = prog[0]?.weight;

  // Build session times from weekly plans
  const allSessions = [];
  wGroups.forEach((wg, wi) => {
    const plan = gs(`wplan_${currentUser.id}_${wi+1}`) || {};
    if (plan.session) allSessions.push({ week: wi+1, label: plan.session });
  });

  return `
  <div class="home-header">
    <div class="home-greeting">歡迎回來 👋</div>
    <div class="home-name">${currentUser.name} 學員</div>
    <div style="margin-top:12px;background:rgba(255,255,255,0.15);border-radius:10px;padding:11px 13px">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.75);margin-bottom:7px;letter-spacing:0.5px">📅 課程行事曆</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.92);line-height:1.8;display:flex;flex-direction:column;gap:2px">
        <div>🟢 開課：${currentUser.start || '--'}</div>
        <div>🏁 結業：${currentUser.end || '課程進行中'}</div>
        ${allSessions.length
          ? allSessions.map(s => `<div>📹 W${s.week} 視訊：${s.label}</div>`).join('')
          : '<div style="opacity:0.6">（視訊課程時間由營養師設定後顯示）</div>'}
      </div>
    </div>
  </div>

  ${fbNoticeHTML}${inboxNoticeHTML}

  <div class="quick-grid">
    <button class="quick-btn" onclick="showPage('food')">
      <div class="quick-btn-icon">🍱</div><div class="quick-btn-label">今日飲食紀錄</div>
    </button>
    <button class="quick-btn" onclick="showPage('body')">

// ── FOOD LIST ──
function renderFoodList() {
  const today = new Date();
  const todayStr = `${today.getMonth()+1}/${today.getDate()}`;

  // Dynamic week grouping — 7 days per week, last week may be shorter
  const weekDates = [];
  for (let w = 0; w * 7 < COURSE_DATES.length; w++) {
    weekDates.push(COURSE_DATES.slice(w * 7, (w + 1) * 7));
  }
  const weekLabels = weekDates.map((chunk, w) =>
    `第${['一','二','三','四','五','六','七','八'][w] || (w+1)}週（${chunk[0]}–${chunk[chunk.length-1]}）`
  );

  let html = `<div class="page-title">每日飲食紀錄</div>
  <div class="notice">💬 每天用餐後記錄飲食內容，記得通知營養師！</div>`;

  weekDates.forEach((wdates, wi) => {
    if (!wdates.length) return;
    html += `<div class="week-header">${weekLabels[wi]}</div>`;
    wdates.forEach(d => {
      const saved = gs(`food_${currentUser.id}_${d}`);
      const isToday = d === todayStr;
      const [m, day] = d.split('/').map(Number);
      const startYear = currentUser.start ? parseInt((currentUser.start||'2026').split('/')[0]) || 2026 : 2026;
      const isPast = new Date(startYear, m-1, day) < today;
      let icon = '⚪️';
      if (saved && saved.notified) icon = '✅';
      else if (saved && (saved.breakfast || saved.lunch || saved.dinner)) icon = '📝';
      else if (isToday) icon = '👉';
      else if (!isPast) icon = '⚪️';
      html += `<div class="day-item" onclick="openFoodDay('${d}')">
        <span style="font-size:18px">${icon}</span>
        <span class="day-item-date" style="${isToday ? 'color:var(--green-dark)' : ''}">${d}${isToday ? '（今天）' : ''}</span>
        <span class="day-item-arrow">›</span>
      </div>`;
    });
  });
  return html;
}

function updateProg(el) {
  const i = parseInt(el.dataset.pi);
  const f = el.dataset.pf;
  const wGroups = buildWeekGroups(COURSE_DATES);
  const totalWeeks = wGroups.length || 1;
  const savedProg = gs(`progress_${currentUser.id}`) || [];
  const prog = Array.from({ length: totalWeeks }, (_, j) =>
    savedProg[j] || { week: `W${j+1}`, weight: null, fat: null, waist: null, muscle: null }
  );
  prog[i][f] = el.value ? parseFloat(el.value) : null;
  ss(`progress_${currentUser.id}`, prog);
}

// ── GOALS (每日打勾，每天凌晨歸零) ──
function renderGoals() {
  const wGroups = buildWeekGroups(COURSE_DATES);
  const totalWeeks = wGroups.length || 1;
  if (currentGoalWeek > totalWeeks) currentGoalWeek = 1;

  const tabs = Array.from({length: totalWeeks}, (_, i) => i+1).map(w => `
    <button class="week-tab-btn ${w === currentGoalWeek ? 'active' : ''}" onclick="switchGoalWeek(${w})">第 ${w} 週</button>`).join('');

  const goals = gs(`goals_${currentUser.id}_${currentGoalWeek}`) || [];
  const today = getTodayKey();
  const dailyDone = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${today}`) || [];

  // Build today's checklist
  const goalItems = goals.length ? goals.map((g, i) => `
    <div class="goal-item" style="align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)">
      <div class="goal-check ${dailyDone[i] ? 'checked' : ''}" onclick="toggleDailyGoal(${i})" style="flex-shrink:0;margin-top:2px"></div>
      <div style="flex:1">
        <div class="goal-text ${dailyDone[i] ? 'done' : ''}" style="font-size:14px">${g.text}</div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:2px">每天做到就打勾～每天凌晨自動歸零</div>
      </div>
    </div>`).join('') : `<div style="text-align:center;padding:24px 0;color:var(--gray-400);font-size:14px">
      本週目標尚未設定<br>請等待營養師更新
    </div>`;

  const doneToday = goals.filter((_, i) => dailyDone[i]).length;

  // 7-day achievement per week
  const curWeekGroup = wGroups[currentGoalWeek - 1];
  const weekDates = curWeekGroup ? curWeekGroup.dates : [];
  const dayRows = weekDates.map(dateStr => {
    const [m, d] = dateStr.split('/');
    const dt = new Date(new Date().getFullYear(), m-1, d);
    const dayKey = `${dt.getFullYear()}_${dt.getMonth()+1}_${dt.getDate()}`;
    const dayDone = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${dayKey}`) || [];
    const dayCount = goals.filter((_, i) => dayDone[i]).length;
    const allDone = goals.length > 0 && dayCount === goals.length;
    const isToday = dayKey === today;
    const isFuture = dt > new Date();
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
      <div style="font-size:18px">${allDone ? '✅' : isFuture ? '⬜' : goals.length === 0 ? '—' : '○'}</div>
      <div style="flex:1;font-size:13px;font-weight:${isToday ? '700' : '400'};color:${isToday ? 'var(--green-dark)' : 'var(--gray-600)'}">
        週${['日','一','二','三','四','五','六'][dt.getDay()]} ${dateStr}${isToday ? '（今天）' : ''}
      </div>
      <div style="font-size:12px;color:${allDone ? 'var(--green)' : 'var(--gray-400)'}">
        ${isFuture ? '—' : goals.length ? `${dayCount}/${goals.length}` : '—'}
      </div>
    </div>`;
  });

  const achievedDays = weekDates.filter(dateStr => {
    const [m, d] = dateStr.split('/');
    const dt = new Date(new Date().getFullYear(), m-1, d);
    if (dt > new Date()) return false;
    const dayKey = `${dt.getFullYear()}_${dt.getMonth()+1}_${dt.getDate()}`;
    const dayDone = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${dayKey}`) || [];
    return goals.length > 0 && goals.every((_, i) => dayDone[i]);
  }).length;
  const totalPassedDays = weekDates.filter(dateStr => {
    const [m, d] = dateStr.split('/');
    return new Date(new Date().getFullYear(), m-1, d) <= new Date();
  }).length;
  const weekPct = totalPassedDays ? Math.round(achievedDays / 7 * 100) : 0;

  return `
  <div class="page-title">每週小目標</div>
  <div class="goal-week-tab">${tabs}</div>

  <div class="card">

  ${totalWeeks > 1 ? `<div class="card">

    ${Array.from({length: totalWeeks}, (_, i) => i+1).map(w => {
      const wg2 = wGroups[w-1];

        const [m2, d2] = dateStr.split('/');

        if (dt2 > new Date()) return false;
        const dk = `${dt2.getFullYear()}_${dt2.getMonth()+1}_${dt2.getDate()}`;
        const dd = gs(`daily_goals_${currentUser.id}_${w}_${dk}`) || [];
        return wGoals.length > 0 && wGoals.every((_, i2) => dd[i2]);
      }).length;

  const sorted = [...msgs].reverse();

function goToFeedbackDay(day) {
  if (!day) { showPage('food'); return; }
  // Mark fbRead for this day
  const f = gs(`food_${currentUser.id}_${day}`);
  if (f) { f.fbRead = true; ss(`food_${currentUser.id}_${day}`, f); }
  currentFoodDay = day;
  // Find which week contains this day
  const wGroups = buildWeekGroups(COURSE_DATES);
  const wi = wGroups.findIndex(wg => wg.dates.includes(day));
  if (wi >= 0) currentFoodWeek = wi + 1;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-food')?.classList.add('active');

  window.scrollTo(0, 0);
}

function openProgressDetail(week) {

function renderProgressDetail(week) {
  const prog = gs(`progress_${currentUser.id}`) || JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
  const p = prog[week - 1] || {};
  const plan = gs(`wplan_${currentUser.id}_${week}`) || {};
  const goals = gs(`goals_${currentUser.id}_${week}`) || [];

  function parseMealLine(str) {
    if (!str) return null;
    const badges = ['C','P','V','F','D','O'];
    const parts = str.split('｜').map(s => s.trim()).filter(Boolean);
    return `<div class="cpvfdo-badges">${parts.map(part => {
      const letter = part.charAt(0);
      if (badges.includes(letter)) return `<span class="badge ${letter}">${part}</span>`;
      return `<span class="badge">${part}</span>`;
    }).join('')}</div>`;
  }

  // Calculate daily total CPVFDO from all meals
  function calcDailyTotal() {
    const keys = ['C','P','V','F','D','O'];
    const totals = {C:0,P:0,V:0,F:0,D:0,O:0};
    const mealStrings = [plan.breakfast, plan.lunch, plan.dinner, plan.snack].filter(Boolean);
    mealStrings.forEach(str => {
      str.split('｜').forEach(part => {
        const t = part.trim();
        const letter = t.charAt(0);
        if (keys.includes(letter)) {
          const num = parseFloat(t.replace(letter,'').trim());
          if (!isNaN(num)) totals[letter] += num;
        }
      });
    });
    const hasAny = Object.values(totals).some(v => v > 0);
    if (!hasAny) return null;
    return keys.map(k => totals[k] > 0 ? `${k} ${totals[k] % 1 === 0 ? totals[k] : totals[k].toFixed(1)}` : null).filter(Boolean).join('｜');
  }

  const hasMeals = plan.breakfast || plan.lunch || plan.dinner || plan.snack;
  const dailyTotal = calcDailyTotal();

  return `
  <button class="back-btn" onclick="backToBody()">‹ 返回身體數值</button>
  <div class="page-title">W${week} 本週計畫</div>

  <div class="card">
    <div class="prog-section">
      <div class="prog-section-title">📅 基本資訊</div>
      <div class="prog-row"><span class="prog-row-label">日期</span><span class="prog-row-val">${plan.date || '---'}</span></div>
      <div class="prog-row"><span class="prog-row-label">熱量設定</span><span class="prog-row-val">${plan.calories || '---'}</span></div>
      <div class="prog-row"><span class="prog-row-label">體重</span><span class="prog-row-val">${p.weight ? p.weight + ' kg' : '尚未記錄'}</span></div>
      <div class="prog-row"><span class="prog-row-label">體脂</span><span class="prog-row-val">${p.fat ? p.fat + ' %' : '尚未記錄'}</span></div>
      <div class="prog-row"><span class="prog-row-label">腰圍</span><span class="prog-row-val">${p.waist ? p.waist + ' cm' : '尚未記錄'}</span></div>
    </div>

    <div class="divider" style="margin:4px 0 14px"></div>

    <div class="prog-section">
      <div class="prog-section-title">🍽️ 餐次分配（C 全穀｜P 豆魚蛋肉｜V 蔬菜｜F 水果｜D 乳品｜O 油脂）</div>
      ${hasMeals ? `
      <div class="meal-dist-grid">
        <div class="meal-dist-item">
          <div class="meal-dist-label">早餐</div>
          ${plan.breakfast ? parseMealLine(plan.breakfast) : '<div class="meal-dist-val">---</div>'}
        </div>
        <div class="meal-dist-item">
          <div class="meal-dist-label">午餐</div>
          ${plan.lunch ? parseMealLine(plan.lunch) : '<div class="meal-dist-val">---</div>'}
        </div>
        <div class="meal-dist-item">
          <div class="meal-dist-label">晚餐</div>
          ${plan.dinner ? parseMealLine(plan.dinner) : '<div class="meal-dist-val">---</div>'}
        </div>
        <div class="meal-dist-item">

    <div class="divider" style="margin:4px 0 14px"></div>

    <div class="prog-section">
      <div class="prog-section-title">🏃 運動建議</div>
      <div style="font-size:14px;color:var(--gray-700);line-height:1.7">${plan.exercise || '---'}</div>
    </div>

    <div class="divider" style="margin:4px 0 14px"></div>

    <div class="prog-section">
      <div class="prog-section-title">📝 備註（飲水、睡眠、其他注意事項）</div>
      <div style="font-size:14px;color:var(--gray-700);line-height:1.7">${plan.note || '---'}</div>

    ${goals.length > 0 ? `
    <div class="divider" style="margin:4px 0 14px"></div>
    <div class="prog-section" style="margin-bottom:0">
      <div class="prog-section-title">🎯 本週小目標</div>
      ${goals.map((g, i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
          <div onclick="toggleGoalInDetail(${i},${week})" style="width:22px;height:22px;border-radius:50%;border:2px solid ${g.done ? 'var(--green)' : 'var(--gray-300)'};background:${g.done ? 'var(--green)' : '#fff'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.2s">
            ${g.done ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
          </div>
          <div style="font-size:13px;color:${g.done ? 'var(--gray-400)' : 'var(--gray-700)'};text-decoration:${g.done ? 'line-through' : 'none'};line-height:1.5">${g.text}</div>
        </div>`).join('')}

    </div>` : ''}

}

function toggleGoalInDetail(i, week) {
  const goals = gs(`goals_${currentUser.id}_${week}`) || [];
  if (!goals[i]) return;
  goals[i].done = !goals[i].done;
  ss(`goals_${currentUser.id}_${week}`, goals);
  document.getElementById('main-content').innerHTML = renderProgressDetail(week);
}

function backToBody() {

  document.getElementById('main-content').innerHTML = renderBody();

// ── MENU ──
// Demo menu data for Period 1. Format: { week: 'W1', days: [{day:'一',meals:{b,l,d,s}},...] }
// ── IMAGE UPLOAD ──
function triggerImgCamera(mealKey) {
  document.getElementById('img-cam-' + mealKey)?.click();
}
function triggerImgGallery(mealKey) {
  document.getElementById('img-gal-' + mealKey)?.click();
}

function handleImgUpload(event, day, mealKey) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  event.target.value = '';
  showToast('📤 壓縮並上傳中…');
  let done = 0;
  const urls = [];

  files.forEach(file => {
    const img = new Image();
    const blobUrl = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(blobUrl);
      canvas.toBlob(async (blob) => {
        try {
          const url = await uploadPhoto(blob, currentUser.id, day, mealKey);
          urls.push(url);
        } catch(e) {
          // fallback: compressed base64
          const r = new FileReader();
          r.onload = ev => urls.push(ev.target.result);
          r.readAsDataURL(blob);
        }
        done++;
        if (done === files.length) appendImgs(day, mealKey, urls);
      }, 'image/jpeg', 0.75);
    };
    img.onerror = () => {
      const reader = new FileReader();
      reader.onload = e => { urls.push(e.target.result); done++; if (done === files.length) appendImgs(day, mealKey, urls); };
      reader.readAsDataURL(file);
    };
    img.src = blobUrl;
  });
}

function appendImgs(day, mealKey, newImgs) {
  if (!newImgs.length) return;
  const existing = gs(`food_${currentUser.id}_${day}`) || {};
  const key = mealKey + '_imgs';
  const current = existing[key] || [];
  const combined = [...current, ...newImgs]; // no cap
  existing[key] = combined;
  ss(`food_${currentUser.id}_${day}`, existing);
  refreshImgPreview(mealKey, day, combined);
  showToast(`✅ 已上傳 ${newImgs.length} 張照片`);
}

function delMealImg(day, mealKey, idx) {
  const existing = gs(`food_${currentUser.id}_${day}`) || {};
  const key = mealKey + '_imgs';
  const imgs = existing[key] || [];
  imgs.splice(idx, 1);
  existing[key] = imgs;
  ss(`food_${currentUser.id}_${day}`, existing);
  refreshImgPreview(mealKey, day, imgs);
  showToast('🗑️ 已刪除，可重新上傳');
}

function refreshImgPreview(mealKey, day, imgs) {
  const previewRow = document.getElementById('preview-' + mealKey);
  const uploadBtns = document.getElementById('upload-btns-' + mealKey);

  if (previewRow) {
    previewRow.innerHTML = imgs.map((src, i) => `
      <div class="img-thumb-wrap">
        <img class="img-thumb" src="${src}" alt="餐點照片">
        <button class="img-thumb-del" onclick="delMealImg('${day}','${mealKey}',${i})" type="button">✕</button>
      </div>`).join('');

    // Update counter
    let counter = previewRow.nextElementSibling;
    if (counter && counter.tagName === 'DIV') {
      if (imgs.length > 0) {
        counter.textContent = `${imgs.length} 張｜點照片右上角 ✕ 可刪除`;
        counter.style.display = '';
      } else {
        counter.style.display = 'none';
      }
    }
  }
  // Upload buttons always visible — no limit
}

// ── ENCY PREVIEW — fullscreen in-app lightbox with left/right navigation ──
let _lbItems = [];   // image items currently in lightbox context
let _lbIdx = 0;      // current index within _lbItems

function openEncyPreview(idx) {
  const now = Date.now();
  const ONE_YEAR = 365 * 24 * 60 * 60 * 1000;
  const items = (gs(`ency_${currentUser.id}`) || []).filter(i => !i.uploadedAt || (now - i.uploadedAt) <= ONE_YEAR);
  const item = items[idx];
  if (!item || !item.fileData) { showToast('此教材無附加檔案'); return; }

  if (item.fileType === 'pdf') {
    const w = window.open();
    if (w) w.document.write(`<html><body style="margin:0"><iframe src="${item.fileData}" width="100%" height="100%" style="border:none;position:fixed;inset:0"></iframe></body></html>`);
    return;
  }

  // Build sibling image list (same category, images only)
  const catKey = item.catKey || item.desc;
  _lbItems = items.map((it, i) => ({ ...it, _origIdx: i }))
    .filter(it => (it.catKey || it.desc) === catKey && it.fileType === 'image' && it.fileData);
  _lbIdx = _lbItems.findIndex(it => it._origIdx === idx);
  if (_lbIdx < 0) _lbIdx = 0;

  renderLightbox();
}

function renderLightbox() {
  document.getElementById('img-lightbox')?.remove();

  const item = _lbItems[_lbIdx];
  if (!item) return;

  const hasPrev = _lbIdx > 0;
  const hasNext = _lbIdx < _lbItems.length - 1;

  const overlay = document.createElement('div');
  overlay.id = 'img-lightbox';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:pan-y;';

  overlay.innerHTML = `
    <button onclick="document.getElementById('img-lightbox').remove()"
      style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;padding:8px;line-height:1;z-index:2">✕</button>

    ${hasPrev ? `<button onclick="lbNav(-1)"
      style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:32px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px)">‹</button>` : ''}

    ${hasNext ? `<button onclick="lbNav(1)"
      style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:32px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px)">›</button>` : ''}

    <img src="${item.fileData}" style="max-width:88vw;max-height:82vh;object-fit:contain;border-radius:4px;user-select:none" draggable="false">

    <div style="color:rgba(255,255,255,0.65);font-size:12px;margin-top:10px;display:flex;align-items:center;gap:12px">
      <span>${item.fileName || ''}</span>
      <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px">${_lbIdx+1} / ${_lbItems.length}</span>
    </div>`;

  // Tap outside to close
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  // Swipe support
  let touchStartX = 0;
  overlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
  });

  // Keyboard support
  overlay._keyHandler = e => {
    if (e.key === 'ArrowLeft') lbNav(-1);
    else if (e.key === 'ArrowRight') lbNav(1);
    else if (e.key === 'Escape') overlay.remove();
  };
  document.addEventListener('keydown', overlay._keyHandler);
  overlay.addEventListener('remove', () => document.removeEventListener('keydown', overlay._keyHandler));

  document.body.appendChild(overlay);
}

function lbNav(dir) {
  const next = _lbIdx + dir;
  if (next < 0 || next >= _lbItems.length) return;
  _lbIdx = next;
  renderLightbox();
}

function openEncyPreview_course(courseIdx) {
  const course = COURSES[courseIdx];
  if (!course) return;
  const rawItems = gs(`ency_${currentUser.id}`) || [];
  const item = rawItems.find(i => i.category === 'course' && i.desc === `course_${course.num}`);
  if (!item) { showToast('課程影片即將上線，敬請期待！'); return; }
  if (item.linkUrl) { window.open(item.linkUrl, '_blank'); return; }
  if (item.fileData) {
    const w = window.open();
    if (w) w.document.write(`<html><body style="margin:0"><iframe src="${item.fileData}" width="100%" height="100%" style="border:none;position:fixed;inset:0"></iframe></body></html>`);
  }
}
